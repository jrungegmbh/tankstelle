name: Supabase Keep-Alive Ping

on:
  schedule:
    - cron: '0 8 * * 1'  # Jeden Montag um 8 Uhr UTC
  workflow_dispatch:      # Manuell auslösbar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "https://rrkqdjswofqhzmrgvsnd.supabase.co/rest/v1/sepa_mandate?select=count&limit=1"
              echo "Ping erfolgreich!"
